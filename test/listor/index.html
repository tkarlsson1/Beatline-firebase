<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Validator 1.06 - NOTESTREAM</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="source-accuracy-styles.css">
</head>
<body>
  <div id="app">
    <!-- UI will be rendered here by ui.js -->
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <!-- Our modules -->
  <script src="firebase-config.js"></script>
  <script src="spotify-helper.js"></script>
  <script src="lastfm-api.js"></script>
  <script src="musicbrainz.js"></script>
  <script src="validator.js"></script>
  <script src="stats-manager.js"></script>
  <script src="ui.js"></script>

  <!-- Initialize -->
  <script>
    // Initialize Firebase for validator database
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Initializing Playlist Validator...');
      
      // Init Validator Firebase
      const validatorDb = window.initValidatorFirebase();
      if (!validatorDb) {
        console.error('❌ Failed to initialize Validator Firebase');
        alert('Firebase-anslutning misslyckades. Kontrollera konsolen.');
        return;
      }
      
      // Init Live Firebase
      const liveDb = window.initLiveFirebase();
      if (!liveDb) {
        console.error('❌ Failed to initialize Live Firebase');
        alert('Live Firebase-anslutning misslyckades. Sync kommer inte fungera.');
      }
      
      // Init UI
      window.initUI();
      
      console.log('✅ Playlist Validator ready');
    });
  </script>
</body>
</html>
